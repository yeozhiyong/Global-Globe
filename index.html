<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Globe - 7 Wonders</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #globe-container { 
            width: 100vw; 
            height: 100vh;
            position: relative;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 14px;
            letter-spacing: 2px;
            opacity: 0.7;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #fff;
            font-size: 12px;
            opacity: 0.6;
            pointer-events: none;
        }
        #wonder-info {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #ffd700;
            pointer-events: none;
            max-width: 300px;
        }
        #wonder-info.visible {
            opacity: 1;
        }
        #wonder-info h3 {
            color: #ffd700;
            margin-bottom: 10px;
            font-size: 18px;
        }
        #wonder-info p {
            color: #ccc;
            font-size: 12px;
            line-height: 1.5;
        }
        #wonder-info .location {
            color: #4fc3f7;
            font-size: 11px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="globe-container">
        <div id="loading">LOADING EARTH...</div>
        <div id="info">Hover over golden markers to see 7 Wonders</div>
        <div id="wonder-info">
            <h3 id="wonder-name"></h3>
            <p id="wonder-desc"></p>
            <div class="location" id="wonder-location"></div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        let scene, camera, renderer, earth, clouds, atmosphere, stars, controls;
        let wonderSprites = [];
        let raycaster, mouse;
        let hoveredWonder = null;

        // 7 Wonders data with coordinates
        const WONDERS = [
            {
                name: "Great Wall of China",
                location: "China",
                lat: 40.4319,
                lon: 116.5704,
                desc: "Ancient series of walls and fortifications, the longest man-made structure in the world."
            },
            {
                name: "Petra",
                location: "Jordan",
                lat: 30.3285,
                lon: 35.4444,
                desc: "Ancient rock-cut city carved into pink sandstone cliffs, the 'Rose City'."
            },
            {
                name: "Christ the Redeemer",
                location: "Rio de Janeiro, Brazil",
                lat: -22.9519,
                lon: -43.2105,
                desc: "Art Deco statue of Jesus Christ, 30m tall, overlooking Rio de Janeiro."
            },
            {
                name: "Machu Picchu",
                location: "Peru",
                lat: -13.1631,
                lon: -72.5450,
                desc: "15th-century Incan citadel set high in the Andes Mountains."
            },
            {
                name: "Chichen Itza",
                location: "Mexico",
                lat: 20.6843,
                lon: -88.5678,
                desc: "Ancient Mayan city featuring the iconic El Castillo pyramid."
            },
            {
                name: "Roman Colosseum",
                location: "Rome, Italy",
                lat: 41.8902,
                lon: 12.4922,
                desc: "Largest ancient amphitheater ever built, center of Roman entertainment."
            },
            {
                name: "Taj Mahal",
                location: "Agra, India",
                lat: 27.1751,
                lon: 78.0421,
                desc: "Stunning white marble mausoleum, symbol of eternal love."
            }
        ];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020204);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 3.5);

            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('globe-container').appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.03;
            controls.minDistance = 1.5;
            controls.maxDistance = 10;
            controls.enablePan = false;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.3;

            createStars();
            createEarth();
            createClouds();
            createAtmosphere();
            createWonderMarkers();

            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
            }, 1000);

            window.addEventListener('resize', onWindowResize, false);
            window.addEventListener('mousemove', onMouseMove, false);
            
            animate();
        }

        function latLonToVector3(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            return new THREE.Vector3(
                -radius * Math.sin(phi) * Math.cos(theta),
                radius * Math.cos(phi),
                radius * Math.sin(phi) * Math.sin(theta)
            );
        }

        function createWonderMarkers() {
            // Create a golden circle texture for markers
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            // Draw golden circle with glow
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, '#ffd700');
            gradient.addColorStop(0.5, '#ffed4a');
            gradient.addColorStop(1, 'rgba(255, 215, 0, 0)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            
            // Inner bright dot
            ctx.beginPath();
            ctx.arc(32, 32, 8, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            
            const markerTexture = new THREE.CanvasTexture(canvas);

            WONDERS.forEach((wonder, index) => {
                const position = latLonToVector3(wonder.lat, wonder.lon, 1.02);
                
                // Create sprite material
                const material = new THREE.SpriteMaterial({
                    map: markerTexture,
                    transparent: true,
                    opacity: 0.9
                });
                
                const sprite = new THREE.Sprite(material);
                sprite.position.copy(position);
                sprite.scale.set(0.08, 0.08, 1);
                sprite.userData = { wonder: wonder, index: index };
                
                scene.add(sprite);
                wonderSprites.push(sprite);
            });
        }

        function createStars() {
            const starsGeometry = new THREE.BufferGeometry();
            const starsCount = 3000;
            const posArray = new Float32Array(starsCount * 3);

            for(let i = 0; i < starsCount * 3; i += 3) {
                const radius = 50 + Math.random() * 50;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                posArray[i] = radius * Math.sin(phi) * Math.cos(theta);
                posArray[i + 1] = radius * Math.sin(phi) * Math.sin(theta);
                posArray[i + 2] = radius * Math.cos(phi);
            }

            starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

            const starsMaterial = new THREE.PointsMaterial({
                size: 0.015,
                color: 0xffffff,
                transparent: true,
                opacity: 0.8
            });

            stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);
        }

        function createEarth() {
            const geometry = new THREE.SphereGeometry(1, 128, 128);
            const textureLoader = new THREE.TextureLoader();
            
            const earthTexture = textureLoader.load(
                'https://www.solarsystemscope.com/textures/download/8k_earth_daymap.jpg',
                undefined,
                undefined,
                function() {
                    earth.material.map = textureLoader.load(
                        'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg'
                    );
                }
            );

            const material = new THREE.MeshBasicMaterial({
                map: earthTexture
            });

            earth = new THREE.Mesh(geometry, material);
            scene.add(earth);
        }

        function createClouds() {
            const geometry = new THREE.SphereGeometry(1.01, 128, 128);
            const textureLoader = new THREE.TextureLoader();
            
            const cloudTexture = textureLoader.load(
                'https://www.solarsystemscope.com/textures/download/8k_earth_clouds.jpg',
                undefined,
                undefined,
                function() {
                    clouds.material.map = textureLoader.load(
                        'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_clouds_1024.png'
                    );
                }
            );
            
            const material = new THREE.MeshBasicMaterial({
                map: cloudTexture,
                transparent: true,
                opacity: 0.4,
                blending: THREE.AdditiveBlending,
                side: THREE.DoubleSide,
                depthWrite: false
            });

            clouds = new THREE.Mesh(geometry, material);
            scene.add(clouds);
        }

        function createAtmosphere() {
            const geometry = new THREE.SphereGeometry(1.15, 64, 64);
            
            const material = new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec3 vNormal;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal;
                    void main() {
                        float intensity = pow(0.6 - dot(vNormal, vec3(0, 0, 1.0)), 4.0);
                        gl_FragColor = vec4(0.3, 0.6, 1.0, 1.0) * intensity;
                    }
                `,
                blending: THREE.AdditiveBlending,
                side: THREE.BackSide,
                transparent: true
            });

            atmosphere = new THREE.Mesh(geometry, material);
            scene.add(atmosphere);
        }

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(wonderSprites);

            if (intersects.length > 0) {
                const sprite = intersects[0].object;
                const wonder = sprite.userData.wonder;
                
                if (hoveredWonder !== wonder) {
                    hoveredWonder = wonder;
                    
                    // Scale up hovered marker
                    sprite.scale.set(0.12, 0.12, 1);
                    
                    // Show info
                    document.getElementById('wonder-name').textContent = wonder.name;
                    document.getElementById('wonder-desc').textContent = wonder.desc;
                    document.getElementById('wonder-location').textContent = `📍 ${wonder.location}`;
                    document.getElementById('wonder-info').classList.add('visible');
                    
                    // Pause rotation
                    controls.autoRotate = false;
                }
            } else {
                if (hoveredWonder) {
                    // Reset all markers
                    wonderSprites.forEach(sprite => {
                        sprite.scale.set(0.08, 0.08, 1);
                    });
                    
                    hoveredWonder = null;
                    document.getElementById('wonder-info').classList.remove('visible');
                    
                    // Resume rotation
                    controls.autoRotate = true;
                }
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (earth) earth.rotation.y += 0.0003;
            if (clouds) clouds.rotation.y += 0.0005;
            if (stars) stars.rotation.y += 0.00005;
            
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
