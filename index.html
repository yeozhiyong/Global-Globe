<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Globe - Interactive</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #globe-container { 
            width: 100vw; 
            height: 100vh;
            position: relative;
            cursor: grab;
        }
        #globe-container:active {
            cursor: grabbing;
        }
        #globe-container.clicked {
            cursor: crosshair;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 14px;
            letter-spacing: 2px;
            opacity: 0.7;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #fff;
            font-size: 12px;
            opacity: 0.6;
            pointer-events: none;
        }
        #selection {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #4fc3f7;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.3s;
            background: rgba(0,0,0,0.8);
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid #4fc3f7;
            pointer-events: none;
            min-width: 220px;
            max-width: 300px;
        }
        #selection.visible {
            opacity: 1;
        }
        #selection .location {
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
            line-height: 1.3;
        }
        #selection .region {
            color: #aaa;
            font-size: 12px;
            margin-bottom: 3px;
        }
        #selection .coords {
            color: #888;
            font-size: 11px;
        }
        #selection .loading {
            color: #888;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div id="globe-container">
        <div id="loading">LOADING EARTH...</div>
        <div id="info">Click to select • Drag to rotate</div>
        <div id="selection"></div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        let scene, camera, renderer, earth, atmosphere, stars, controls;
        let raycaster, mouse;
        let selectionMarker = null;
        let isDragging = false;
        let mouseDownTime = 0;
        let mouseDownPos = { x: 0, y: 0 };

        // Major regions for fallback
        const REGIONS = [
            { name: "North America", minLat: 15, maxLat: 75, minLon: -170, maxLon: -50 },
            { name: "South America", minLat: -55, maxLat: 15, minLon: -85, maxLon: -35 },
            { name: "Europe", minLat: 35, maxLat: 70, minLon: -25, maxLon: 45 },
            { name: "Africa", minLat: -35, maxLat: 35, minLon: -20, maxLon: 55 },
            { name: "Asia", minLat: 10, maxLat: 75, minLon: 55, maxLon: 180 },
            { name: "Australia", minLat: -45, maxLat: -10, minLon: 110, maxLon: 155 },
            { name: "Oceania", minLat: -50, maxLat: 0, minLon: 110, maxLon: 180 },
            { name: "Antarctica", minLat: -90, maxLat: -60, minLon: -180, maxLon: 180 },
            { name: "Arctic Ocean", minLat: 70, maxLat: 90, minLon: -180, maxLon: 180 },
            { name: "North Pacific", minLat: 0, maxLat: 60, minLon: 120, maxLon: 180 },
            { name: "South Pacific", minLat: -60, maxLat: 0, minLon: 120, maxLon: 180 },
            { name: "North Atlantic", minLat: 0, maxLat: 70, minLon: -80, maxLon: 20 },
            { name: "South Atlantic", minLat: -60, maxLat: 0, minLon: -80, maxLon: 20 },
            { name: "Indian Ocean", minLat: -60, maxLat: 30, minLon: 20, maxLon: 150 },
            { name: "Southern Ocean", minLat: -60, maxLat: -45, minLon: -180, maxLon: 180 }
        ];

        function getRegionName(lat, lon) {
            for (const region of REGIONS) {
                if (lat >= region.minLat && lat <= region.maxLat &&
                    lon >= region.minLon && lon <= region.maxLon) {
                    return region.name;
                }
            }
            return "Open Ocean";
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020204);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 3.5);

            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('globe-container').appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Controls with graceful auto-rotation
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.03; // Smoother damping
            controls.minDistance = 1.5;
            controls.maxDistance = 10;
            controls.enablePan = false;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.3; // Slower rotation

            createStars();
            createEarth();
            createAtmosphere();

            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
            }, 1000);

            // Event listeners
            window.addEventListener('resize', onWindowResize, false);
            
            // Mouse events for click vs drag detection
            const container = document.getElementById('globe-container');
            container.addEventListener('mousedown', onMouseDown, false);
            container.addEventListener('mousemove', onMouseMove, false);
            container.addEventListener('mouseup', onMouseUp, false);
            
            animate();
        }

        function createStars() {
            const starsGeometry = new THREE.BufferGeometry();
            const starsCount = 3000;
            const posArray = new Float32Array(starsCount * 3);

            for(let i = 0; i < starsCount * 3; i += 3) {
                const radius = 50 + Math.random() * 50;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                posArray[i] = radius * Math.sin(phi) * Math.cos(theta);
                posArray[i + 1] = radius * Math.sin(phi) * Math.sin(theta);
                posArray[i + 2] = radius * Math.cos(phi);
            }

            starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

            const starsMaterial = new THREE.PointsMaterial({
                size: 0.015,
                color: 0xffffff,
                transparent: true,
                opacity: 0.8
            });

            stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);
        }

        function createEarth() {
            const geometry = new THREE.SphereGeometry(1, 128, 128);
            const textureLoader = new THREE.TextureLoader();
            
            const earthTexture = textureLoader.load(
                'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg'
            );

            const material = new THREE.MeshBasicMaterial({
                map: earthTexture
            });

            earth = new THREE.Mesh(geometry, material);
            scene.add(earth);
        }

        function createAtmosphere() {
            const geometry = new THREE.SphereGeometry(1.15, 64, 64);
            
            const material = new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec3 vNormal;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal;
                    void main() {
                        float intensity = pow(0.6 - dot(vNormal, vec3(0, 0, 1.0)), 4.0);
                        gl_FragColor = vec4(0.3, 0.6, 1.0, 1.0) * intensity;
                    }
                `,
                blending: THREE.AdditiveBlending,
                side: THREE.BackSide,
                transparent: true
            });

            atmosphere = new THREE.Mesh(geometry, material);
            scene.add(atmosphere);
        }

        function createSelectionMarker(position) {
            if (selectionMarker) {
                scene.remove(selectionMarker);
            }
            
            selectionMarker = new THREE.Group();
            
            const dotGeometry = new THREE.SphereGeometry(0.02, 16, 16);
            const dotMaterial = new THREE.MeshBasicMaterial({
                color: 0x00ff00,
                transparent: true,
                opacity: 0.9
            });
            const dot = new THREE.Mesh(dotGeometry, dotMaterial);
            selectionMarker.add(dot);
            
            const ringGeometry = new THREE.RingGeometry(0.03, 0.04, 32);
            const ringMaterial = new THREE.MeshBasicMaterial({
                color: 0x00ff00,
                transparent: true,
                opacity: 0.6,
                side: THREE.DoubleSide
            });
            const ring = new THREE.Mesh(ringGeometry, ringMaterial);
            ring.lookAt(camera.position);
            selectionMarker.add(ring);
            
            selectionMarker.position.copy(position);
            scene.add(selectionMarker);
        }

        function onMouseDown(event) {
            isDragging = false;
            mouseDownTime = Date.now();
            mouseDownPos = { x: event.clientX, y: event.clientY };
            
            // Stop auto-rotation on mouse down
            controls.autoRotate = false;
        }

        function onMouseMove(event) {
            // Detect if user is dragging
            const dx = event.clientX - mouseDownPos.x;
            const dy = event.clientY - mouseDownPos.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance > 5) {
                isDragging = true;
            }
        }

        async function onMouseUp(event) {
            const clickDuration = Date.now() - mouseDownTime;
            
            // Only process as click if it was a short duration and minimal movement
            if (!isDragging && clickDuration < 300) {
                // This was a click, not a drag
                await handleGlobeClick(event);
            }
            
            // Resume auto-rotation after a delay
            setTimeout(() => {
                controls.autoRotate = true;
            }, 2000);
        }

        async function handleGlobeClick(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(earth);

            if (intersects.length > 0) {
                const point = intersects[0].point;
                const uv = intersects[0].uv;
                
                // More accurate coordinate calculation
                const lat = (0.5 - uv.y) * 180;
                const lon = (uv.x - 0.5) * 360;
                
                createSelectionMarker(point);
                
                const selectionDiv = document.getElementById('selection');
                selectionDiv.innerHTML = `
                    <div class="loading">Looking up location...</div>
                    <div class="coords">Lat: ${lat.toFixed(4)}°, Lon: ${lon.toFixed(4)}°</div>
                `;
                selectionDiv.classList.add('visible');
                
                // Get location info
                const location = await getLocationInfo(lat, lon);
                const regionName = getRegionName(lat, lon);
                
                if (location) {
                    let locationParts = [];
                    
                    if (location.city) locationParts.push(location.city);
                    else if (location.state) locationParts.push(location.state);
                    
                    if (location.country && !locationParts.includes(location.country)) {
                        locationParts.push(location.country);
                    }
                    
                    let mainLocation = locationParts.join(', ');
                    let subLocation = '';
                    
                    if (!mainLocation) {
                        if (location.ocean) {
                            mainLocation = location.ocean;
                            subLocation = 'Ocean';
                        } else if (location.sea) {
                            mainLocation = location.sea;
                            subLocation = 'Sea';
                        } else {
                            mainLocation = regionName;
                            subLocation = 'Region';
                        }
                    }
                    
                    selectionDiv.innerHTML = `
                        <div class="location">${mainLocation || regionName}</div>
                        ${subLocation ? `<div class="region">${subLocation}</div>` : ''}
                        <div class="coords">Lat: ${lat.toFixed(4)}°, Lon: ${lon.toFixed(4)}°</div>
                    `;
                } else {
                    selectionDiv.innerHTML = `
                        <div class="location">${regionName}</div>
                        <div class="region">Region</div>
                        <div class="coords">Lat: ${lat.toFixed(4)}°, Lon: ${lon.toFixed(4)}°</div>
                    `;
                }
            }
        }

        async function getLocationInfo(lat, lon) {
            try {
                await new Promise(resolve => setTimeout(resolve, 100));
                
                const response = await fetch(
                    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10&accept-language=en`,
                    {
                        headers: {
                            'User-Agent': 'GlobalGlobe/1.0'
                        }
                    }
                );
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                return { 
                    city: data.address?.city || data.address?.town || data.address?.village || data.address?.hamlet || data.address?.suburb || '',
                    state: data.address?.state || data.address?.region || data.address?.province || '',
                    country: data.address?.country || data.address?.country_name || '',
                    ocean: data.address?.ocean || '',
                    sea: data.address?.sea || '',
                    display_name: data.display_name
                };
            } catch (error) {
                console.error('Geocoding error:', error);
                return null;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (earth) earth.rotation.y += 0.0003; // Slower rotation
            if (stars) stars.rotation.y += 0.00005;
            
            if (selectionMarker) {
                selectionMarker.children[1].lookAt(camera.position);
            }
            
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
