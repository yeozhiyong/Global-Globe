<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Globe - NASA Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #globe-container { 
            width: 100vw; 
            height: 100vh;
            position: relative;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 14px;
            letter-spacing: 2px;
            opacity: 0.7;
            pointer-events: none;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <div id="globe-container">
        <div id="loading">LOADING EARTH...</div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        let scene, camera, renderer, earth, clouds, atmosphere, stars, controls;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020204);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 3.5);

            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('globe-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.03;
            controls.minDistance = 1.5;
            controls.maxDistance = 10;
            controls.enablePan = false;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.3;

            createStars();
            createEarth();
            createClouds();
            createAtmosphere();

            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
            }, 1000);

            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function createStars() {
            const starsGeometry = new THREE.BufferGeometry();
            const starsCount = 3000;
            const posArray = new Float32Array(starsCount * 3);

            for(let i = 0; i < starsCount * 3; i += 3) {
                const radius = 50 + Math.random() * 50;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                posArray[i] = radius * Math.sin(phi) * Math.cos(theta);
                posArray[i + 1] = radius * Math.sin(phi) * Math.sin(theta);
                posArray[i + 2] = radius * Math.cos(phi);
            }

            starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

            const starsMaterial = new THREE.PointsMaterial({
                size: 0.015,
                color: 0xffffff,
                transparent: true,
                opacity: 0.8
            });

            stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);
        }

        function createEarth() {
            const geometry = new THREE.SphereGeometry(1, 128, 128);
            const textureLoader = new THREE.TextureLoader();
            
            // Using Solar System Scope 8K Earth texture (higher quality)
            const earthTexture = textureLoader.load(
                'https://www.solarsystemscope.com/textures/download/8k_earth_daymap.jpg',
                function(texture) {
                    console.log('Earth texture loaded');
                },
                undefined,
                function(err) {
                    // Fallback to NASA texture
                    console.log('Loading fallback texture');
                    earth.material.map = textureLoader.load(
                        'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg'
                    );
                }
            );

            const material = new THREE.MeshBasicMaterial({
                map: earthTexture
            });

            earth = new THREE.Mesh(geometry, material);
            scene.add(earth);
        }

        function createClouds() {
            const geometry = new THREE.SphereGeometry(1.01, 128, 128);
            const textureLoader = new THREE.TextureLoader();
            
            // Solar System Scope 8K cloud texture
            const cloudTexture = textureLoader.load(
                'https://www.solarsystemscope.com/textures/download/8k_earth_clouds.jpg',
                function(texture) {
                    console.log('Cloud texture loaded');
                },
                undefined,
                function(err) {
                    // Fallback to NASA cloud texture
                    console.log('Loading fallback cloud texture');
                    clouds.material.map = textureLoader.load(
                        'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_clouds_1024.png'
                    );
                }
            );
            
            const material = new THREE.MeshBasicMaterial({
                map: cloudTexture,
                transparent: true,
                opacity: 0.4,
                blending: THREE.AdditiveBlending,
                side: THREE.DoubleSide,
                depthWrite: false
            });

            clouds = new THREE.Mesh(geometry, material);
            scene.add(clouds);
        }

        function createAtmosphere() {
            const geometry = new THREE.SphereGeometry(1.15, 64, 64);
            
            const material = new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec3 vNormal;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal;
                    void main() {
                        float intensity = pow(0.6 - dot(vNormal, vec3(0, 0, 1.0)), 4.0);
                        gl_FragColor = vec4(0.3, 0.6, 1.0, 1.0) * intensity;
                    }
                `,
                blending: THREE.AdditiveBlending,
                side: THREE.BackSide,
                transparent: true
            });

            atmosphere = new THREE.Mesh(geometry, material);
            scene.add(atmosphere);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (earth) earth.rotation.y += 0.0003;
            if (clouds) clouds.rotation.y += 0.0005;
            if (stars) stars.rotation.y += 0.00005;
            
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
