<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Globe - Interactive</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #globe-container { 
            width: 100vw; 
            height: 100vh;
            position: relative;
            cursor: crosshair;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 14px;
            letter-spacing: 2px;
            opacity: 0.7;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #fff;
            font-size: 12px;
            opacity: 0.6;
            pointer-events: none;
        }
        #selection {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #4fc3f7;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 5px;
            border: 1px solid #4fc3f7;
        }
        #selection.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="globe-container">
        <div id="loading">LOADING EARTH...</div>
        <div id="info">Click on globe to select location</div>
        <div id="selection"></div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        let scene, camera, renderer, earth, clouds, atmosphere, stars, starField, controls;
        let time = 0;
        let raycaster, mouse;
        let selectedPoint = null;
        let selectionMarker = null;

        function init() {
            // Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020204);
            scene.fog = new THREE.FogExp2(0x020204, 0.02);

            // Camera
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 4);

            // Renderer
            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: true,
                powerPreference: "high-performance"
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('globe-container').appendChild(renderer.domElement);

            // Raycaster for click detection
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 2;
            controls.maxDistance = 10;
            controls.enablePan = false;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;

            createStarField();
            createEarth();
            createClouds();
            createAtmosphere();

            // Hide loading
            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
            }, 1000);

            // Event listeners
            window.addEventListener('resize', onWindowResize, false);
            renderer.domElement.addEventListener('click', onGlobeClick, false);
            
            animate();
        }

        function createStarField() {
            const starGroups = [];
            
            for (let layer = 0; layer < 3; layer++) {
                const starsGeometry = new THREE.BufferGeometry();
                const starsCount = 2000;
                const posArray = new Float32Array(starsCount * 3);
                const sizesArray = new Float32Array(starsCount);
                const opacityArray = new Float32Array(starsCount);

                for(let i = 0; i < starsCount; i++) {
                    const i3 = i * 3;
                    const radius = 50 + layer * 30;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2 * Math.random() - 1);
                    
                    posArray[i3] = radius * Math.sin(phi) * Math.cos(theta);
                    posArray[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                    posArray[i3 + 2] = radius * Math.cos(phi);
                    
                    sizesArray[i] = Math.random() * (0.5 + layer * 0.3) + 0.1;
                    opacityArray[i] = Math.random() * 0.5 + 0.3;
                }

                starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
                starsGeometry.setAttribute('size', new THREE.BufferAttribute(sizesArray, 1));
                starsGeometry.setAttribute('opacity', new THREE.BufferAttribute(opacityArray, 1));

                const starsMaterial = new THREE.ShaderMaterial({
                    uniforms: {
                        time: { value: 0 },
                        color: { value: new THREE.Color(0xffffff) }
                    },
                    vertexShader: `
                        attribute float size;
                        attribute float opacity;
                        varying float vOpacity;
                        void main() {
                            vOpacity = opacity;
                            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                            gl_PointSize = size * (300.0 / -mvPosition.z);
                            gl_Position = projectionMatrix * mvPosition;
                        }
                    `,
                    fragmentShader: `
                        uniform vec3 color;
                        uniform float time;
                        varying float vOpacity;
                        void main() {
                            float dist = length(gl_PointCoord - vec2(0.5));
                            if (dist > 0.5) discard;
                            float alpha = smoothstep(0.5, 0.0, dist) * vOpacity;
                            alpha *= 0.7 + 0.3 * sin(time * 2.0 + gl_FragCoord.x * 0.1);
                            gl_FragColor = vec4(color, alpha);
                        }
                    `,
                    transparent: true,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                });

                const starLayer = new THREE.Points(starsGeometry, starsMaterial);
                starLayer.userData = { isStarLayer: true, layer: layer };
                scene.add(starLayer);
                starGroups.push(starLayer);
            }
            
            starField = starGroups;
        }

        function createEarth() {
            const geometry = new THREE.SphereGeometry(1, 256, 256);
            const textureLoader = new THREE.TextureLoader();
            
            // Load textures
            const earthTexture = textureLoader.load(
                'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg'
            );
            
            const nightTexture = textureLoader.load(
                'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_lights_2048.png'
            );
            
            const bumpMap = textureLoader.load(
                'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_normal_2048.jpg'
            );

            // Simple material without external lighting
            const material = new THREE.ShaderMaterial({
                uniforms: {
                    dayTexture: { value: earthTexture },
                    nightTexture: { value: nightTexture },
                    bumpMap: { value: bumpMap },
                    sunDirection: { value: new THREE.Vector3(1, 0.3, 1) }
                },
                vertexShader: `
                    varying vec2 vUv;
                    varying vec3 vNormal;
                    
                    void main() {
                        vUv = uv;
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform sampler2D dayTexture;
                    uniform sampler2D nightTexture;
                    uniform sampler2D bumpMap;
                    uniform vec3 sunDirection;
                    
                    varying vec2 vUv;
                    varying vec3 vNormal;
                    
                    void main() {
                        vec3 dayColor = texture2D(dayTexture, vUv).rgb;
                        vec3 nightColor = texture2D(nightTexture, vUv).rgb;
                        
                        // Fixed lighting direction
                        vec3 lightDir = normalize(sunDirection);
                        float cosAngle = max(dot(vNormal, lightDir), 0.0);
                        
                        // Day/night mix
                        float mixFactor = smoothstep(-0.1, 0.3, cosAngle);
                        vec3 color = mix(nightColor * 2.0, dayColor, mixFactor);
                        
                        // Add subtle grain
                        float noise = fract(sin(dot(vUv, vec2(12.9898, 78.233))) * 43758.5453);
                        color *= 0.98 + noise * 0.04;
                        
                        gl_FragColor = vec4(color, 1.0);
                    }
                `
            });

            earth = new THREE.Mesh(geometry, material);
            scene.add(earth);
        }

        function createClouds() {
            const geometry = new THREE.SphereGeometry(1.015, 128, 128);
            const textureLoader = new THREE.TextureLoader();
            
            const cloudTexture = textureLoader.load(
                'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_clouds_1024.png'
            );
            
            const material = new THREE.MeshBasicMaterial({
                map: cloudTexture,
                transparent: true,
                opacity: 0.4,
                blending: THREE.AdditiveBlending,
                side: THREE.DoubleSide,
                depthWrite: false
            });

            clouds = new THREE.Mesh(geometry, material);
            scene.add(clouds);
        }

        function createAtmosphere() {
            const geometry = new THREE.SphereGeometry(1.08, 64, 64);
            
            const material = new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec3 vNormal;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal;
                    void main() {
                        float intensity = pow(0.7 - dot(vNormal, vec3(0, 0, 1.0)), 3.0);
                        gl_FragColor = vec4(0.3, 0.6, 1.0, 1.0) * intensity * 0.6;
                    }
                `,
                blending: THREE.AdditiveBlending,
                side: THREE.BackSide,
                transparent: true
            });

            atmosphere = new THREE.Mesh(geometry, material);
            scene.add(atmosphere);
        }

        function createSelectionMarker() {
            const geometry = new THREE.SphereGeometry(0.03, 16, 16);
            const material = new THREE.MeshBasicMaterial({
                color: 0x4fc3f7,
                transparent: true,
                opacity: 0.8
            });
            
            selectionMarker = new THREE.Mesh(geometry, material);
            
            // Add glow ring
            const ringGeometry = new THREE.RingGeometry(0.04, 0.05, 32);
            const ringMaterial = new THREE.MeshBasicMaterial({
                color: 0x4fc3f7,
                transparent: true,
                opacity: 0.5,
                side: THREE.DoubleSide
            });
            const ring = new THREE.Mesh(ringGeometry, ringMaterial);
            ring.lookAt(camera.position);
            selectionMarker.add(ring);
            
            scene.add(selectionMarker);
        }

        function onGlobeClick(event) {
            // Calculate mouse position in normalized device coordinates
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            // Update the picking ray with the camera and mouse position
            raycaster.setFromCamera(mouse, camera);

            // Calculate objects intersecting the picking ray
            const intersects = raycaster.intersectObject(earth);

            if (intersects.length > 0) {
                const point = intersects[0].point;
                const uv = intersects[0].uv;
                
                // Convert to lat/lon
                const lat = 90 - (uv.y * 180);
                const lon = (uv.x * 360) - 180;
                
                // Update selection
                selectedPoint = point;
                
                // Create or update marker
                if (!selectionMarker) {
                    createSelectionMarker();
                }
                selectionMarker.position.copy(point);
                selectionMarker.visible = true;
                
                // Update UI
                const selectionDiv = document.getElementById('selection');
                selectionDiv.innerHTML = `
                    <strong>Selected Location</strong><br>
                    Lat: ${lat.toFixed(2)}°<br>
                    Lon: ${lon.toFixed(2)}°
                `;
                selectionDiv.classList.add('visible');
                
                // Pause auto-rotation briefly
                controls.autoRotate = false;
                setTimeout(() => {
                    controls.autoRotate = true;
                }, 3000);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            time += 0.001;
            
            // Earth rotation
            if (earth) {
                earth.rotation.y += 0.0005;
            }
            
            // Cloud rotation
            if (clouds) {
                clouds.rotation.y += 0.0007;
            }
            
            // Atmosphere rotation
            if (atmosphere) {
                atmosphere.rotation.y += 0.0003;
            }
            
            // Star twinkling
            if (starField) {
                starField.forEach((layer, index) => {
                    layer.material.uniforms.time.value = time + index;
                });
            }
            
            // Update selection marker to face camera
            if (selectionMarker && selectionMarker.visible) {
                selectionMarker.children[0].lookAt(camera.position);
            }
            
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
