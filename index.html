<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Globe - NASA Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #globe-container { 
            width: 100vw; 
            height: 100vh;
            position: relative;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 14px;
            letter-spacing: 2px;
            opacity: 0.7;
            pointer-events: none;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <div id="globe-container">
        <div id="loading">LOADING EARTH...</div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        let scene, camera, renderer, earth, clouds, atmosphere, stars, starField, controls;
        let time = 0;

        function init() {
            // Scene setup with fog for depth
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020204);
            scene.fog = new THREE.FogExp2(0x020204, 0.02);

            // Camera with cinematic positioning
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 4);

            // Renderer with high quality settings
            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: true,
                powerPreference: "high-performance"
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.getElementById('globe-container').appendChild(renderer.domElement);

            // Controls with smooth damping
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 2;
            controls.maxDistance = 10;
            controls.enablePan = false;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;

            createStarField();
            createEarth();
            createClouds();
            createAtmosphere();
            createLighting();

            // Hide loading
            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
            }, 1000);

            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function createStarField() {
            // Create a multi-layered star field for depth
            const starGroups = [];
            
            // Distant stars
            for (let layer = 0; layer < 3; layer++) {
                const starsGeometry = new THREE.BufferGeometry();
                const starsCount = 2000;
                const posArray = new Float32Array(starsCount * 3);
                const sizesArray = new Float32Array(starsCount);
                const opacityArray = new Float32Array(starsCount);

                for(let i = 0; i < starsCount; i++) {
                    const i3 = i * 3;
                    const radius = 50 + layer * 30;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2 * Math.random() - 1);
                    
                    posArray[i3] = radius * Math.sin(phi) * Math.cos(theta);
                    posArray[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                    posArray[i3 + 2] = radius * Math.cos(phi);
                    
                    sizesArray[i] = Math.random() * (0.5 + layer * 0.3) + 0.1;
                    opacityArray[i] = Math.random() * 0.5 + 0.3;
                }

                starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
                starsGeometry.setAttribute('size', new THREE.BufferAttribute(sizesArray, 1));
                starsGeometry.setAttribute('opacity', new THREE.BufferAttribute(opacityArray, 1));

                // Custom shader for twinkling stars
                const starsMaterial = new THREE.ShaderMaterial({
                    uniforms: {
                        time: { value: 0 },
                        color: { value: new THREE.Color(0xffffff) }
                    },
                    vertexShader: `
                        attribute float size;
                        attribute float opacity;
                        varying float vOpacity;
                        void main() {
                            vOpacity = opacity;
                            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                            gl_PointSize = size * (300.0 / -mvPosition.z);
                            gl_Position = projectionMatrix * mvPosition;
                        }
                    `,
                    fragmentShader: `
                        uniform vec3 color;
                        uniform float time;
                        varying float vOpacity;
                        void main() {
                            float dist = length(gl_PointCoord - vec2(0.5));
                            if (dist > 0.5) discard;
                            float alpha = smoothstep(0.5, 0.0, dist) * vOpacity;
                            // Twinkle effect
                            alpha *= 0.7 + 0.3 * sin(time * 2.0 + gl_FragCoord.x * 0.1);
                            gl_FragColor = vec4(color, alpha);
                        }
                    `,
                    transparent: true,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                });

                const starLayer = new THREE.Points(starsGeometry, starsMaterial);
                starLayer.userData = { isStarLayer: true, layer: layer };
                scene.add(starLayer);
                starGroups.push(starLayer);
            }
            
            starField = starGroups;
        }

        function createEarth() {
            const geometry = new THREE.SphereGeometry(1, 256, 256);
            const textureLoader = new THREE.TextureLoader();
            
            // NASA Blue Marble texture with night lights
            const earthTexture = textureLoader.load(
                'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg',
                function(texture) {
                    texture.colorSpace = THREE.SRGBColorSpace;
                }
            );
            
            // Night lights texture for dark side
            const nightTexture = textureLoader.load(
                'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_lights_2048.png'
            );
            
            const bumpMap = textureLoader.load(
                'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_normal_2048.jpg'
            );
            
            const specularMap = textureLoader.load(
                'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg'
            );

            // Custom shader for day/night transition
            const material = new THREE.ShaderMaterial({
                uniforms: {
                    dayTexture: { value: earthTexture },
                    nightTexture: { value: nightTexture },
                    bumpMap: { value: bumpMap },
                    specularMap: { value: specularMap },
                    sunDirection: { value: new THREE.Vector3(1, 0.5, 1) },
                    time: { value: 0 }
                },
                vertexShader: `
                    varying vec2 vUv;
                    varying vec3 vNormal;
                    varying vec3 vPosition;
                    
                    void main() {
                        vUv = uv;
                        vNormal = normalize(normalMatrix * normal);
                        vPosition = (modelViewMatrix * vec4(position, 1.0)).xyz;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform sampler2D dayTexture;
                    uniform sampler2D nightTexture;
                    uniform sampler2D bumpMap;
                    uniform sampler2D specularMap;
                    uniform vec3 sunDirection;
                    uniform float time;
                    
                    varying vec2 vUv;
                    varying vec3 vNormal;
                    varying vec3 vPosition;
                    
                    void main() {
                        vec3 dayColor = texture2D(dayTexture, vUv).rgb;
                        vec3 nightColor = texture2D(nightTexture, vUv).rgb;
                        float specular = texture2D(specularMap, vUv).r;
                        
                        // Calculate lighting
                        vec3 lightDir = normalize(sunDirection);
                        float cosAngle = max(dot(vNormal, lightDir), 0.0);
                        
                        // Day/night mix with smooth transition
                        float mixFactor = smoothstep(-0.1, 0.3, cosAngle);
                        vec3 color = mix(nightColor * 2.0, dayColor, mixFactor);
                        
                        // Add specular reflection on water
                        vec3 viewDir = normalize(-vPosition);
                        vec3 halfDir = normalize(lightDir + viewDir);
                        float spec = pow(max(dot(vNormal, halfDir), 0.0), 32.0) * specular;
                        color += vec3(spec) * mixFactor;
                        
                        // Add subtle grain/noise
                        float noise = fract(sin(dot(vUv, vec2(12.9898, 78.233))) * 43758.5453);
                        color *= 0.98 + noise * 0.04;
                        
                        gl_FragColor = vec4(color, 1.0);
                    }
                `
            });

            earth = new THREE.Mesh(geometry, material);
            scene.add(earth);
        }

        function createClouds() {
            const geometry = new THREE.SphereGeometry(1.015, 128, 128);
            const textureLoader = new THREE.TextureLoader();
            
            const cloudTexture = textureLoader.load(
                'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_clouds_1024.png'
            );
            
            const material = new THREE.MeshPhongMaterial({
                map: cloudTexture,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending,
                side: THREE.DoubleSide,
                depthWrite: false,
                color: 0xffffff
            });

            clouds = new THREE.Mesh(geometry, material);
            scene.add(clouds);
        }

        function createAtmosphere() {
            // Inner atmosphere glow
            const innerGeometry = new THREE.SphereGeometry(1.05, 64, 64);
            const innerMaterial = new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec3 vNormal;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal;
                    void main() {
                        float intensity = pow(0.65 - dot(vNormal, vec3(0, 0, 1.0)), 3.0);
                        gl_FragColor = vec4(0.4, 0.7, 1.0, 1.0) * intensity * 0.8;
                    }
                `,
                blending: THREE.AdditiveBlending,
                side: THREE.BackSide,
                transparent: true
            });

            const innerAtmosphere = new THREE.Mesh(innerGeometry, innerMaterial);
            scene.add(innerAtmosphere);

            // Outer atmosphere glow (rim lighting)
            const outerGeometry = new THREE.SphereGeometry(1.2, 64, 64);
            const outerMaterial = new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec3 vNormal;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal;
                    void main() {
                        float intensity = pow(0.4 - dot(vNormal, vec3(0, 0, 1.0)), 2.0);
                        gl_FragColor = vec4(0.2, 0.5, 1.0, 1.0) * intensity * 0.3;
                    }
                `,
                blending: THREE.AdditiveBlending,
                side: THREE.BackSide,
                transparent: true
            });

            atmosphere = new THREE.Mesh(outerGeometry, outerMaterial);
            scene.add(atmosphere);
        }

        function createLighting() {
            // Ambient light for base illumination
            const ambientLight = new THREE.AmbientLight(0x1a1a2e, 0.5);
            scene.add(ambientLight);

            // Main sun light
            const sunLight = new THREE.DirectionalLight(0xfff4e6, 2.5);
            sunLight.position.set(5, 3, 5);
            scene.add(sunLight);

            // Rim light for dramatic effect
            const rimLight = new THREE.DirectionalLight(0x4488ff, 0.8);
            rimLight.position.set(-5, 0, -5);
            scene.add(rimLight);

            // Fill light
            const fillLight = new THREE.DirectionalLight(0x666699, 0.3);
            fillLight.position.set(0, -5, 2);
            scene.add(fillLight);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            time += 0.001;
            
            // Smooth earth rotation
            if (earth) {
                earth.rotation.y += 0.0005;
                earth.material.uniforms.time.value = time;
            }
            
            // Slightly faster cloud rotation
            if (clouds) {
                clouds.rotation.y += 0.0007;
                clouds.rotation.x = Math.sin(time * 0.5) * 0.02;
            }
            
            // Atmosphere subtle pulse
            if (atmosphere) {
                atmosphere.rotation.y += 0.0003;
                atmosphere.scale.setScalar(1 + Math.sin(time * 2) * 0.005);
            }
            
            // Update star twinkling
            if (starField) {
                starField.forEach((layer, index) => {
                    layer.material.uniforms.time.value = time + index;
                    layer.rotation.y += 0.0001 * (index + 1);
                });
            }
            
            // Subtle camera orbit
            camera.position.x = Math.sin(time * 0.2) * 0.2;
            camera.position.y = Math.cos(time * 0.15) * 0.1;
            camera.lookAt(0, 0, 0);
            
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
